version: "3.4"

networks:
  my-network:
    driver: bridge

services:
  jenkins:
    container_name: jenkins
    image: ${JENKINS_IMAGE:-jenkins/jenkins:jdk21}
    privileged: true
    user: root
    environment:
      JAVA_OPTS: "-Xmx2g -Xms512m -XX:+UseG1GC"
    ports:
      - "8082:8080"
      - "50000:50000"
    networks:
      - my-network
    volumes:
      - /var/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/local/bin/docker:/usr/local/bin/docker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  java-jdk21-jenkins-agent-1:
    image: java-jdk21-jenkins-agent-ext
    build:
      context: ./java-jdk21-agent
    init: true
    user: root
    command: >-
      java -jar /usr/share/jenkins/agent.jar
      -url http://jenkins:8080
      ${JAVA_JDK21_AGENT_1_SECRET}
      java-jdk21-jenkins-agent-1
    restart: unless-stopped
    networks:
      - my-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G

