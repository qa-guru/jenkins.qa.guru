name: trigger-jenkins-build

on:
  workflow_dispatch:
    inputs:
      job:
        description: Jenkins job name
        required: false
        default: ui_tests_with_attachments

jobs:
  trigger:
    runs-on: ubuntu-latest
    environment: jenkins-production
    steps:
      - name: Build Now on prod
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.JENKINS_DEPLOY_HOST || secrets.SELENOID_DEPLOY_HOST }}
          username: ${{ secrets.JENKINS_DEPLOY_USER || secrets.SELENOID_DEPLOY_USER }}
          key: ${{ secrets.JENKINS_DEPLOY_KEY || secrets.SELENOID_DEPLOY_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            JOB="${{ inputs.job }}"
            trigger_build() {
              if CRUMB=$(curl -sf 'http://127.0.0.1:8082/crumbIssuer/api/json' 2>/dev/null | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d["crumbRequestField"]+":"+d["crumb"])'); then
                curl -sf -X POST -H "$CRUMB" "http://127.0.0.1:8082/job/${JOB}/build?delay=0sec"
              else
                sudo docker exec jenkins bash -lc "curl -sf -X POST http://127.0.0.1:8080/job/${JOB}/build?delay=0sec"
              fi
            }
            trigger_build
            echo "queued ${JOB}"
            for i in $(seq 1 60); do
              sleep 10
              last=$(curl -sf "http://127.0.0.1:8082/job/${JOB}/lastBuild/api/json?tree=number,building,result" || echo '{}')
              echo "poll $i: $last"
              echo "$last" | python3 -c 'import json,sys; d=json.load(sys.stdin); raise SystemExit(0 if not d.get("building") else 1)' && break
            done
            BUILD=$(curl -sf "http://127.0.0.1:8082/job/${JOB}/lastBuild/api/json?tree=number,result,url" || true)
            echo "lastBuild: $BUILD"
            LOG=$(curl -sf "http://127.0.0.1:8082/job/${JOB}/lastBuild/consoleText" | tail -40 || true)
            echo "=== console tail ==="
            echo "$LOG"
            WS="/var/jenkins_home/jobs/${JOB}/builds/$(echo "$BUILD" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("number",""))' 2>/dev/null)/archive/build/allure-results" 
            ls -la "$WS" 2>/dev/null | head -10 || echo "no archived allure-results yet"
