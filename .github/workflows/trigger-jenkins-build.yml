name: trigger-jenkins-build

on:
  workflow_dispatch:
    inputs:
      job:
        description: Jenkins job name
        required: false
        default: ui_tests_with_attachments

jobs:
  trigger:
    runs-on: ubuntu-latest
    environment: jenkins-production
    steps:
      - name: Build Now on prod
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.JENKINS_DEPLOY_HOST || secrets.SELENOID_DEPLOY_HOST }}
          username: ${{ secrets.JENKINS_DEPLOY_USER || secrets.SELENOID_DEPLOY_USER }}
          key: ${{ secrets.JENKINS_DEPLOY_KEY || secrets.SELENOID_DEPLOY_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            JOB="${{ inputs.job }}"
            JOB_DIR="/var/jenkins_home/jobs/${JOB}"
            sudo test -f "${JOB_DIR}/config.xml"
            BUILD=$(sudo cat "${JOB_DIR}/nextBuildNumber" 2>/dev/null || echo 1)
            echo "expect build #${BUILD}"
            sudo docker exec jenkins bash -lc "curl -sf -X POST http://127.0.0.1:8080/job/${JOB}/build?delay=0sec && echo queued" || true
            for i in $(seq 1 90); do
              if sudo test -f "${JOB_DIR}/builds/${BUILD}/log" && sudo grep -q 'Finished:' "${JOB_DIR}/builds/${BUILD}/log"; then
                break
              fi
              sleep 10
            done
            echo "=== build #${BUILD} tail ==="
            sudo tail -60 "${JOB_DIR}/builds/${BUILD}/log" || true
            echo "=== allure summary ==="
            sudo cat "${JOB_DIR}/builds/${BUILD}/archive/allure-summary.json" 2>/dev/null || echo no summary
            sudo grep -E 'Allure results count|allure-results does not exist|Allure report|BUILD SUCCESS|Finished:' "${JOB_DIR}/builds/${BUILD}/log" | tail -15 || true
