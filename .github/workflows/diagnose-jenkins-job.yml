name: diagnose-jenkins-job

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: jenkins-production
    steps:
      - name: Diagnose ui_tests_with_attachments on prod
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.JENKINS_DEPLOY_HOST || secrets.SELENOID_DEPLOY_HOST }}
          username: ${{ secrets.JENKINS_DEPLOY_USER || secrets.SELENOID_DEPLOY_USER }}
          key: ${{ secrets.JENKINS_DEPLOY_KEY || secrets.SELENOID_DEPLOY_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            echo "=== job dir ==="
            ls -la /var/jenkins_home/jobs/ui_tests_with_attachments/ 2>&1 || true
            echo "=== compare pageobject job ==="
            ls -la /var/jenkins_home/jobs/ui_tests_with_pageobject/ 2>&1 || true
            echo "=== java_base view config ==="
            grep -R "java_base" /var/jenkins_home/config.xml /var/jenkins_home/*.xml 2>/dev/null | head -40 || true
            echo "=== views in config.xml ==="
            python3 - <<'PY'
            import xml.etree.ElementTree as ET
            root = ET.parse('/var/jenkins_home/config.xml').getroot()
            for view in root.findall('.//view'):
                name = view.get('name') or view.findtext('name')
                if name:
                    print('VIEW:', name)
            for holder in root.findall('.//{*}ListView'):
                n = holder.find('{*}name')
                if n is not None and n.text:
                    print('LISTVIEW:', n.text)
                    jobs = holder.find('{*}jobNames')
                    if jobs is not None:
                        for j in jobs.findall('{*}string'):
                            print('  job:', j.text)
                    regex = holder.find('{*}jobFilters/{*}RegexKeyJobFilter/{*}regex')
                    if regex is not None and regex.text:
                        print('  regex:', regex.text)
            PY
            echo "=== curl local job pages ==="
            curl -sk -o /dev/null -w 'pageobject=%{http_code}\n' http://127.0.0.1:8082/job/ui_tests_with_pageobject/ || true
            curl -sk -o /dev/null -w 'attachments=%{http_code}\n' http://127.0.0.1:8082/job/ui_tests_with_attachments/ || true
