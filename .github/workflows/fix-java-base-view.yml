name: fix-java-base-view

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    environment: jenkins-production
    steps:
      - name: Fix java_base view on prod
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.JENKINS_DEPLOY_HOST || secrets.SELENOID_DEPLOY_HOST }}
          username: ${{ secrets.JENKINS_DEPLOY_USER || secrets.SELENOID_DEPLOY_USER }}
          key: ${{ secrets.JENKINS_DEPLOY_KEY || secrets.SELENOID_DEPLOY_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cat > /tmp/fix-java-base-view.groovy <<'GROOVY'
            import jenkins.model.Jenkins
            import hudson.model.ListView
            def j = Jenkins.instance
            println 'ALL VIEWS:'
            j.views.each { v -> println "  ${v.name} :: ${v.class.name}" }
            def job = j.getItem('ui_tests_with_attachments')
            println "JOB ui_tests_with_attachments: ${job != null ? 'OK' : 'MISSING'}"
            def view = j.getView('java_base')
            if (view == null) {
              println 'Creating ListView java_base'
              view = new ListView('java_base')
              view.description = 'Java Base course'
              j.addView(view)
            }
            if (view instanceof ListView) {
              def names = new ArrayList(view.jobNames)
              ['ui_tests_with_attachments','ui_tests_with_pageobject','full_ui_tests','ui_tests_ya_pageobject'].each { n ->
                if (j.getItem(n) != null && !names.contains(n)) names.add(n)
              }
              view.jobNames = names
              println "jobNames: ${view.jobNames}"
            } else {
              println "java_base is ${view.class.name}"
            }
            j.save()
            println 'saved'
            GROOVY
            docker cp /tmp/fix-java-base-view.groovy jenkins:/tmp/fix-java-base-view.groovy
            docker exec jenkins bash -lc '
              CRUMB=$(curl -sf http://127.0.0.1:8080/crumbIssuer/api/xml?xpath=concat(//crumbRequestField,":",//crumb))
              curl -sf -X POST -H "$CRUMB" --data-urlencode "script=$(cat /tmp/fix-java-base-view.groovy)" http://127.0.0.1:8080/scriptText
            '
