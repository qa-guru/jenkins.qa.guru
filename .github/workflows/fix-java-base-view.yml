name: fix-java-base-view

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    environment: jenkins-production
    steps:
      - name: Fix java_base view on prod
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.JENKINS_DEPLOY_HOST || secrets.SELENOID_DEPLOY_HOST }}
          username: ${{ secrets.JENKINS_DEPLOY_USER || secrets.SELENOID_DEPLOY_USER }}
          key: ${{ secrets.JENKINS_DEPLOY_KEY || secrets.SELENOID_DEPLOY_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            ENV_FILE=/var/docker-compose-config/agents.env
            JUSER="$(sudo grep -E '^JENKINS_ADMIN_USER=' "$ENV_FILE" | cut -d= -f2- || true)"
            JTOKEN="$(sudo grep -E '^JENKINS_ADMIN_TOKEN=' "$ENV_FILE" | cut -d= -f2- || true)"
            if [[ -z "$JUSER" || -z "$JTOKEN" ]]; then
              echo "Jenkins admin creds not in agents.env — listing view names via container"
              docker exec jenkins bash -lc 'curl -sf http://127.0.0.1:8080/api/json?tree=views[name,url]' || true
            fi
            GROOVY='import jenkins.model.Jenkins
            def j = Jenkins.instance
            println "ALL VIEWS:"
            j.views.each { v -> println "  ${v.name} :: ${v.class.name}" }
            def job = j.getItem("ui_tests_with_attachments")
            println "JOB: ${job != null ? job.name : "MISSING"} url=${job?.url}"
            def view = j.getView("java_base")
            if (view == null) {
              println "Creating ListView java_base"
              def lv = new hudson.model.ListView("java_base")
              lv.description = "Java Base course"
              j.addView(lv)
              view = lv
            }
            if (view instanceof hudson.model.ListView) {
              def names = new ArrayList(view.jobNames)
              println "jobNames before: ${names}"
              for (def n in ["ui_tests_with_attachments","ui_tests_with_pageobject","full_ui_tests"]) {
                if (j.getItem(n) != null && !names.contains(n)) names.add(n)
              }
              view.jobNames = names
              println "jobNames after: ${view.jobNames}"
            } else {
              println "java_base is ${view.class.name} not ListView"
            }
            j.save()
            println "saved"'
            if [[ -n "$JUSER" && -n "$JTOKEN" ]]; then
              printf '%s' "$GROOVY" | docker exec -i jenkins java -jar /opt/jenkins-cli.jar -s http://127.0.0.1:8080/ -auth "$JUSER:$JTOKEN" groovy =
            else
              printf '%s' "$GROOVY" | docker exec -i jenkins bash -lc 'curl -sf -X POST -H "Jenkins-Crumb:$(curl -sf http://127.0.0.1:8080/crumbIssuer/api/xml?xpath=concat(//crumbRequestField,\":\",//crumb))" --data-urlencode script@-' http://127.0.0.1:8080/scriptText' || true
            fi
