name: fix-java-base-view

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    environment: jenkins-production
    steps:
      - name: Fix java_base view on prod
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.JENKINS_DEPLOY_HOST || secrets.SELENOID_DEPLOY_HOST }}
          username: ${{ secrets.JENKINS_DEPLOY_USER || secrets.SELENOID_DEPLOY_USER }}
          key: ${{ secrets.JENKINS_DEPLOY_KEY || secrets.SELENOID_DEPLOY_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            sudo python3 - <<'PY'
            import shutil
            import xml.etree.ElementTree as ET
            from datetime import datetime
            from pathlib import Path

            cfg = Path('/var/jenkins_home/config.xml')
            bak = cfg.with_suffix(f'.xml.bak-{datetime.now():%Y%m%d%H%M%S}')
            shutil.copy2(cfg, bak)
            tree = ET.parse(cfg)
            root = tree.getroot()

            views = root.find('views')
            if views is None:
                views = ET.SubElement(root, 'views')

            java_view = None
            for child in views:
                name_el = child.find('name')
                if name_el is not None and name_el.text == 'java_base':
                    java_view = child
                    break

            jobs = [
                'ui_tests_with_attachments',
                'ui_tests_with_pageobject',
                'full_ui_tests',
                'ui_tests_ya_pageobject',
            ]
            existing_jobs = {p.name for p in Path('/var/jenkins_home/jobs').iterdir() if p.is_dir()}

            if java_view is None:
                java_view = ET.SubElement(views, 'hudson.model.ListView')
                ET.SubElement(java_view, 'owner', {'class': 'hudson', 'reference': '../../..'})
                ET.SubElement(java_view, 'name').text = 'java_base'
                ET.SubElement(java_view, 'description').text = 'Java Base course'
                ET.SubElement(java_view, 'filterExecutors').text = 'false'
                ET.SubElement(java_view, 'filterQueue').text = 'false'
                ET.SubElement(java_view, 'properties', {'class': 'hudson.model.View$PropertyList'})
                job_names = ET.SubElement(java_view, 'jobNames')
                for job in jobs:
                    if job in existing_jobs:
                        ET.SubElement(job_names, 'string').text = job
                ET.SubElement(java_view, 'jobFilters')
                ET.SubElement(java_view, 'columns')
                ET.SubElement(java_view, 'recurse').text = 'false'
                print('created java_base ListView')
            else:
                job_names = java_view.find('jobNames')
                if job_names is None:
                    job_names = ET.SubElement(java_view, 'jobNames')
                present = {el.text for el in job_names.findall('string')}
                for job in jobs:
                    if job in existing_jobs and job not in present:
                        ET.SubElement(job_names, 'string').text = job
                        print('added', job)
                print('updated java_base ListView')

            tree.write(cfg, encoding='UTF-8', xml_declaration=True)
            print('config saved, backup:', bak)
            PY
            cd /var/docker-compose-config && docker compose --env-file agents.env restart jenkins
            for i in $(seq 1 30); do
              curl -sf http://127.0.0.1:8082/login -o /dev/null && echo "jenkins ready $i" && break
              sleep 5
            done
