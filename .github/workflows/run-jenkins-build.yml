name: run-jenkins-build

on:
  workflow_dispatch:
    inputs:
      job:
        default: ui_tests_with_attachments

jobs:
  run:
    runs-on: ubuntu-latest
    environment: jenkins-production
    steps:
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.JENKINS_DEPLOY_HOST || secrets.SELENOID_DEPLOY_HOST }}
          username: ${{ secrets.JENKINS_DEPLOY_USER || secrets.SELENOID_DEPLOY_USER }}
          key: ${{ secrets.JENKINS_DEPLOY_KEY || secrets.SELENOID_DEPLOY_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            JOB="${{ inputs.job }}"
            JOB_DIR="/var/jenkins_home/jobs/${JOB}"
            sudo test -f "${JOB_DIR}/config.xml"
            BEFORE=$(sudo cat "${JOB_DIR}/nextBuildNumber" 2>/dev/null || echo 1)
            echo "next build number: ${BEFORE}"
            if CRUMB=$(curl -sf 'http://127.0.0.1:8082/crumbIssuer/api/json' 2>/dev/null | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d["crumbRequestField"]+":"+d["crumb"])'); then
              curl -sf -X POST -H "$CRUMB" "http://127.0.0.1:8082/job/${JOB}/build?delay=0sec" && echo queued
            else
              sudo docker exec jenkins bash -lc "curl -sf -X POST http://127.0.0.1:8080/job/${JOB}/build?delay=0sec && echo queued"
            fi
            BUILD=$BEFORE
            for i in $(seq 1 90); do
              if sudo test -f "${JOB_DIR}/builds/${BUILD}/log" && sudo grep -q 'Finished:' "${JOB_DIR}/builds/${BUILD}/log"; then
                break
              fi
              sleep 10
            done
            echo "=== build #${BUILD} tail ==="
            sudo tail -50 "${JOB_DIR}/builds/${BUILD}/log" || true
            echo "=== allure summary ==="
            sudo cat "${JOB_DIR}/builds/${BUILD}/archive/allure-summary.json" 2>/dev/null || echo no summary
            sudo grep -E 'Finished:|BUILD SUCCESS|BUILD FAILED|tests completed|Allure report' "${JOB_DIR}/builds/${BUILD}/log" | tail -10 || true
