name: jenkins-build-log

on:
  workflow_dispatch:
    inputs:
      job:
        default: ui_tests_with_attachments
      build:
        default: "last"

jobs:
  log:
    runs-on: ubuntu-latest
    environment: jenkins-production
    steps:
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.JENKINS_DEPLOY_HOST || secrets.SELENOID_DEPLOY_HOST }}
          username: ${{ secrets.JENKINS_DEPLOY_USER || secrets.SELENOID_DEPLOY_USER }}
          key: ${{ secrets.JENKINS_DEPLOY_KEY || secrets.SELENOID_DEPLOY_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            JOB="${{ inputs.job }}"
            BUILD="${{ inputs.build }}"
            if [[ "$BUILD" == "last" ]]; then
              BUILD=$(cat "/var/jenkins_home/jobs/${JOB}/lastBuildNumber")
              BUILD=$((BUILD - 1))
            fi
            echo "=== build ${BUILD} log tail ==="
            tail -100 "/var/jenkins_home/jobs/${JOB}/builds/${BUILD}/log" || true
            echo "=== config publishers ==="
            grep -A20 'AllureReportPublisher\|gradlew' "/var/jenkins_home/jobs/${JOB}/config.xml" || true
            echo "=== archive tree ==="
            find "/var/jenkins_home/jobs/${JOB}/builds/${BUILD}/archive" -maxdepth 4 -type d 2>/dev/null | head -30 || true
            find "/var/jenkins_home/jobs/${JOB}/builds/${BUILD}/archive" -name '*allure*' 2>/dev/null | head -20 || true
